<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>체인지메이커스 원데이클래스 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: #080808;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 90px;
  }
  .header {
    padding: 30px 24px;
    background: linear-gradient(180deg, rgba(74,222,128,0.15) 0%, rgba(8,8,8,1) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    text-align: center;
  }
  .logo {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 0.1em;
    color: #4ADE80;
    margin-bottom: 16px;
  }
  .title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
  
  .form-section {
    padding: 32px 24px;
  }
  .field {
    margin-bottom: 24px;
  }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 10px;
    color: rgba(255,255,255,0.85);
  }
  .field input, .field select {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: all 0.2s ease;
  }
  .field input::placeholder {
    color: rgba(255,255,255,0.25);
  }
  .field input:focus, .field select:focus {
    border-color: #4ADE80;
    background: rgba(74,222,128,0.05);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.15);
  }
  
  .privacy-wrap {
    margin-top: 32px;
    background: rgba(255,255,255,0.02);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .privacy-wrap label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .privacy-wrap input[type="checkbox"] {
    appearance: none;
    width: 24px;
    height: 24px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
  }
  .privacy-wrap input[type="checkbox"]:checked {
    background: #4ADE80;
    border-color: #4ADE80;
  }
  .privacy-wrap input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 7px;
    top: 3px;
    width: 5px;
    height: 10px;
    border: solid #080808;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .privacy-text {
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255,255,255,0.5);
  }
  
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 16px 24px;
    background: rgba(8,8,8,0.9);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
  }
  .submit-btn {
    width: 100%;
    background: #4ADE80;
    color: #080808;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    padding: 18px 0;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .submit-btn:active {
    transform: scale(0.97);
  }
  
  /* Select box 화살표 커스텀 */
  select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='rgba(255,255,255,0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 16px;
  }

  /* 성공 모달 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .modal-content {
    background: #111;
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
    width: 100%;
    box-shadow: 0 20px 40px rgba(74,222,128,0.1);
  }
  .modal-icon {
    font-size: 48px;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
    color: #4ADE80;
  }
  .modal-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    margin-bottom: 30px;
  }
  .modal-close {
    width: 100%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  
  /* 모바일 반응형 (CTA 버튼 텍스트 최적화) */
  @media (max-width: 480px) {
    .submit-btn {
      font-size: 15px;
      padding: 15px 0;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">CHANGE MAKERS</div>
  <div class="title">총학생회 제휴 특별 혜택<br>무료 특강 & 1:1 상담 신청</div>
  <div class="subtitle">협약캠퍼스 오프라인 원데이 클래스 참석 및 1:1 맞춤 상담 예약을 위해<br>아래 내용을 입력해주세요.</div>
</div>

<div class="form-section">
  <form id="applyForm">
    <div class="field">
      <label>이름</label>
      <input type="text" name="이름" placeholder="홍길동" required>
    </div>
    
    <div class="field">
      <label>연락처</label>
      <input type="tel" id="phoneInput" name="연락처" placeholder="010-0000-0000" required>
    </div>
    
    <div class="field">
      <label>소속 대학교</label>
      <input type="text" name="소속대학교" placeholder="대학교 이름을 적어주세요" required>
    </div>
    
    <div class="field">
      <label>전공(학과)</label>
      <input type="text" name="전공" placeholder="주전공을 적어주세요" required>
    </div>
    
    <div class="field">
      <label>학년</label>
      <select name="학년" required>
        <option value="" disabled selected>학년을 선택해주세요</option>
        <option value="1학년">1학년</option>
        <option value="2학년">2학년</option>
        <option value="3학년">3학년</option>
        <option value="4학년 이상">4학년 이상</option>
        <option value="졸업생">졸업생</option>
      </select>
    </div>
    
    <div class="field">
      <label>희망 직무 (선택)</label>
      <input type="text" name="희망직무" placeholder="예: 마케팅, 영업, 기획 등 (없으면 공란)">
    </div>

    <div class="field">
      <label style="color:#4ADE80;">컨설턴트 1:1 상담신청 (무료)</label>
      <select name="상담신청여부" required>
        <option value="" disabled selected>상담 희망 여부를 선택해주세요</option>
        <option value="네, 특강 전후로 상담을 받고 싶습니다">네, 특강 전후로 맞춤 상담을 받고 싶습니다 (추천)</option>
        <option value="아니요, 우선 무료 특강만 신청하겠습니다">아니요, 우선 무료 특강만 신청하겠습니다</option>
      </select>
    </div>

    <div class="field">
      <label>현재 취업 준비 시 가장 큰 고민</label>
      <select name="취업고민" required>
        <option value="" disabled selected>해당되는 고민을 선택해주세요</option>
        <option value="직무 설정 자체가 막막하다">직무 설정 자체가 막막하다</option>
        <option value="자소서 소재 발굴이 어렵다">자소서 소재 발굴이 어렵다</option>
        <option value="서류 합격률이 낮다">서류 합격률이 낮다</option>
        <option value="면접에서 말을 잘 못한다">면접에서 말을 잘 못한다</option>
        <option value="기타">기타</option>
      </select>
    </div>

    <div class="privacy-wrap">
      <label>
        <input type="checkbox" name="개인정보동의" value="동의함" required>
        <div class="privacy-text">
          <strong style="color:#fff;">개인정보 수집 및 이용 동의 (필수)</strong><br>
          무료 특강 안내 및 1:1 컨설턴트 상담 배정을 위해 위의 개인정보를 수집하며, 목적 달성 후 파기합니다.
        </div>
      </label>
    </div>
  </form>
</div>

<div class="bottom-bar">
  <button class="submit-btn" onclick="submitForm()">무료 특강 & 1차 상담 신청하기 (선착순 40명)</button>
</div>

<!-- 성공 모달 -->
<div class="modal-overlay" id="successModal">
  <div class="modal-content">
    <div class="modal-icon">🎉</div>
    <div class="modal-title">신청이 접수되었습니다!</div>
    <div class="modal-desc">
      원데이클래스 신청이 정상적으로 완료되었습니다.<br>
      상세한 참석 안내는 남겨주신 연락처로<br>곧 개별 문자 발송될 예정입니다.
    </div>
    <button class="modal-close" onclick="closeModal()">확인</button>
  </div>
</div>

<script>
  // [실무진 안내] 구글 스프레드시트 Apps Script 배포 URL을 아래 변수에 넣어주세요.
  const GOOGLE_APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx8M-7sGUgb_xHCvnjHROl3cCLKG4QpeEA6S7V5TtW8TYWSoUNeZLYMbZ-l0R7mH105yA/exec';

  function submitForm() {
    const form = document.getElementById('applyForm');
    const submitBtn = document.querySelector('.submit-btn');

    if (form.checkValidity()) {
      // 1. 제출 버튼 상태 변경 (중복 제출 방지)
      submitBtn.disabled = true;
      submitBtn.innerText = '신청 중...';

      // 2. 폼 데이터 추출
      const formData = new FormData(form);

      // 3. 구글 시트로 데이터 전송 (백엔드 연동)
      // * URL이 세팅되지 않았을 경우 일단 바로 모달만 띄우게 처리 (디자인 프리뷰용)
      if (GOOGLE_APP_SCRIPT_URL === '여기에_구글_스크립트_URL_입력') {
        setTimeout(() => {
          submitBtn.disabled = false;
          submitBtn.innerText = '무료 특강 & 1차 상담 신청하기 (선착순 40명)';
          document.getElementById('successModal').style.display = 'flex';
          form.reset(); // 입력값 초기화
        }, 800);
        return;
      }

      fetch(GOOGLE_APP_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
      })
      .then(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = '무료 특강 & 1차 상담 신청하기 (선착순 40명)';
        document.getElementById('successModal').style.display = 'flex';
        form.reset(); // 성공 시 입력값 초기화
      })
      .catch(error => {
        alert('신청 처리 중 오류가 발생했습니다. 다시 시도해 주세요.');
        submitBtn.disabled = false;
        submitBtn.innerText = '무료 특강 & 1차 상담 신청하기 (선착순 40명)';
      });

    } else {
      // 필수값 누락 시 브라우저 기본 경고 띄우기
      form.reportValidity();
    }
  }
  
  function closeModal() {
    document.getElementById('successModal').style.display = 'none';
  }

  // 핸드폰 번호 자동 하이픈(-) 포맷팅 기능
  document.getElementById('phoneInput').addEventListener('input', function (e) {
    let raw = e.target.value.replace(/[^0-9]/g, ''); // 숫자 이외의 문자 제거
    if (raw.length > 11) {
      raw = raw.substring(0, 11); // 11자리까지만 허용
    }
    
    let formatted = '';
    
    if (raw.length < 4) {
      formatted = raw;
    } else if (raw.length < 8) {
      formatted = raw.substring(0, 3) + '-' + raw.substring(3);
    } else {
      formatted = raw.substring(0, 3) + '-' + raw.substring(3, 7) + '-' + raw.substring(7);
    }
    
    e.target.value = formatted;
  });
</script>

</body>
</html>
